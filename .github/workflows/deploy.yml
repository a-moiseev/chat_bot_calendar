name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  # Same checks ci.yml runs. Master pushes therefore run them twice, once here
  # and once via ci.yml; that keeps the README badge reflecting master while the
  # deploy still gates on its own green run.
  test:
    uses: ./.github/workflows/checks.yml

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_IDS: ${{ vars.ADMIN_IDS }}
          LOCALE: ${{ vars.LOCALE }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: BOT_TOKEN,ADMIN_IDS,LOCALE
          script: |
            cd /opt/chat_bot_calendar

            export BOT_TOKEN="$BOT_TOKEN"
            export ADMIN_IDS="$ADMIN_IDS"
            export LOCALE="$LOCALE"

            # fetch + reset, not pull: pull breaks on a force-pushed branch,
            # and reset makes the deployed tree match origin exactly. Ignored
            # paths (config/welcome.html, data/) are left untouched.
            git fetch origin master
            git reset --hard origin/master

            docker compose build
            docker compose up -d

            echo "Waiting for the bot to become healthy..."
            for _ in $(seq 1 30); do
              if curl -fsS "http://127.0.0.1:${HEALTH_PORT:-8080}/healthz"; then
                healthy=1
                echo
                break
              fi
              sleep 2
            done

            echo "Service status:"
            docker compose ps

            echo "Bot logs:"
            docker compose logs --tail=30 bot

            if [ -z "$healthy" ]; then
              echo "The bot did not answer 200 on /healthz within 60 seconds - deploy failed"
              exit 1
            fi
