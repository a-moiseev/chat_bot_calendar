name: Checks

# Defined once and called by both ci.yml and deploy.yml, so the deploy gate and
# the pull-request gate can never drift apart.
on:
  workflow_call:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install uv
          uv pip install -r requirements.txt --system

      - name: Lint
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .

      - name: Type check
        run: mypy .

      - name: Run tests
        run: pytest --cov=bot --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          # Never fail the build on a Codecov outage: coverage is a report,
          # not a gate. The gate is fail_under in .coveragerc.
          fail_ci_if_error: false
        env:
          # Optional for a public repo (tokenless upload works); set the secret
          # only if uploads start hitting Codecov's rate limit.
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
