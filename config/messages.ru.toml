# Русские строки интерфейса. Правила — см. комментарий в messages.en.toml.

[button]
skip = "⏭ Пропустить"
send_now = "📣 Отправить сейчас"
schedule = "🕒 По расписанию"
cancel = "✖️ Отмена"

[word]
skip = "Пропустить"

[broadcast]
cancelled = "Рассылка отменена."
ask_text = "Создаём рассылку. Пришлите <b>текст</b> сообщения (форматирование сохранится). /cancel — отмена."
ask_media = "Принято. Прикрепите <b>фото или видео</b> — или нажмите «{skip}»."
ask_buttons = "Кнопки — по одной в строке в формате <code>Текст - https://ссылка</code>.\nИли нажмите «{skip}»."
buttons_parse_failed = "Не получилось разобрать кнопки: {reason}\nПопробуйте ещё раз или нажмите «{skip}»."
preview = "Так будет выглядеть рассылка:"
ask_when = "Получателей: <b>{count}</b>\nКогда отправить?"
sending = "Отправляю…"
sent = "Готово. Отправлено: {sent}, ошибок: {failed}."
ask_datetime = "Пришлите дату и время отправки (мск). Например:\n<code>24.06.2026 19:00</code>, <code>24.06 19:00</code> (текущий год) или просто <code>19:00</code> (сегодня)."
bad_datetime = "Не понял дату. Формат: <code>ДД.ММ.ГГГГ ЧЧ:ММ</code>. Попробуйте ещё раз."
past_datetime = "Это время уже прошло. Укажите будущую дату и время."
scheduled = "Запланировано на <b>{send_at}</b> (мск)."

[button_error]
no_separator = "Строка без разделителя ' - ': {line!r}"
bad_scheme = "Ссылка должна начинаться с http:// или https://: {url!r}"
no_buttons = "Не найдено ни одной кнопки."

[admin]
no_subscribers = "Подписчиков пока нет."
subscribers_header = "Подписчиков: <b>{count}</b>"
no_scheduled = "Запланированных рассылок нет."
scheduled_header = "Запланировано: <b>{count}</b>\nОтменить: <code>/cancel_scheduled id</code>"
scheduled_item = "<b>#{id}</b> — {send_at} (мск){tags}\n{snippet}…"
cancel_usage = "Укажите id рассылки: <code>/cancel_scheduled 3</code>"
cancel_done = "Рассылка #{id} отменена."
cancel_not_found = "Рассылка #{id} не найдена среди запланированных."

[help]
text = '''
<b>Команды администратора</b>

/broadcast — создать рассылку всем подписчикам.
Мастер по шагам спросит: текст → фото/видео (можно «Пропустить») → кнопки (можно «Пропустить») → когда отправить (сейчас или по расписанию).
/cancel — прервать создание рассылки.

/stats — число подписчиков и их список (id, имя, username).

/scheduled — список запланированных рассылок.
/cancel_scheduled &lt;id&gt; — отменить запланированную рассылку по её номеру.

/help — это сообщение.

<b>Формат кнопок</b>
По одной в строке: <code>Текст - https://ссылка</code>

<b>Формат даты (мск)</b>
<code>24.06.2026 19:00</code> — полная дата
<code>24.06 19:00</code> — текущий год
<code>19:00</code> — сегодня
'''
