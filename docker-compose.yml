services:
  bot:
    build: .
    restart: unless-stopped
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_IDS=${ADMIN_IDS}
      - LOCALE=${LOCALE:-en}
      - DB_PATH=/app/data/bot.sqlite3
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
    ports:
      # expose the liveness probe for external monitoring (Uptime Kuma etc.)
      - "${HEALTH_PORT:-8080}:8080"
    healthcheck:
      # the slim image has no curl, so probe via python
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=5)
      interval: 60s
      timeout: 10s
      start_period: 20s
      retries: 3
